<!DOCTYPE html>
<html>
<head>
    <title>invisible</title>
<style>
    body {
        background-color: #000000;
        font-family: Calibri;
    }
    .v1 {
        color: #00A2E8;
    .v2 {
        color: #B5E61D;
    }
    p {
        color: #FFFFFF;
    }
</style>
</head>
<body>
    <h1>invisible</h1>
    <p class="v1">can you hear me?</p>
    <p class="v2">yes, i can.</p>
    <p class="v1">can you see me?</p>
    <p class="v2">no, i can't.</p>
    <p class="v1">can anyone see me?</p>
    <p class="v2">no. we are all invisible. i can't see you, you can't see me, neither of us can see anyone else.</p>
    <p class="v1">maybe we were not made to be seen.</p>
</body>

</html>
